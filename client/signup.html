<!DOCTYPE html>

<html lang="en">

<head>


    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sign Up - Luxury Hotel</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="css/style.css">


</head>

<body>

<div id="app">


    <section class="auth-page">

        <div class="auth-card">
            <div class="text-center mb-4">

                <a
                        href="index.html"
                        class="navbar-brand luxury-logo">

                    👑 Luxury Hotel

                </a>

            </div>

            <h1 class="auth-title">

                Create Account

            </h1>

            <p class="auth-subtitle">

                Join Luxury Hotel today

            </p>

            <input
                    class="form-control auth-input"

                    v-model="signupUsername"

                    placeholder="Username">

            <input
                    class="form-control auth-input"

                    type="password"

                    v-model="signupPassword"

                    placeholder="Password">

            <button
                    class="btn auth-btn"

                    v-on:click="signup">

                Sign Up

            </button>

            <div class="auth-footer">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </div>

            <div class="text-center mt-4">

                <a
                        href="index.html"

                        class="btn btn-outline-light">

                    ← Back Home

                </a>

            </div>

        </div>

    </section>


</div>

<script src="libs/vue.js"></script>

<script src="libs/axios.js"></script>

<script src="js/config.js"></script>

<script src="js/clientMethods.js"></script>

<script src="js/userMethods.js"></script>

<script src="js/roomMethods.js"></script>

<script src="js/reservationMethods.js"></script>

<script src="js/balanceRequestMethods.js"></script>

<script src="js/app.js"></script>

</body>

</html>
