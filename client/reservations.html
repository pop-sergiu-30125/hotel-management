<!DOCTYPE html>

<html lang="en">

<head>


    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reservations - Luxury Hotel</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="css/style.css">


</head>

<body>

<div id="app">


    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark luxury-navbar">

        <div class="container">

            <a class="navbar-brand luxury-logo"
               href="index.html">

                👑 Luxury Hotel

            </a>

            <div class="navbar-nav ms-auto">

                <a class="nav-link luxury-link"
                   href="index.html">

                    Home

                </a>

                <a class="nav-link luxury-link"
                   href="rooms.html">

                    Rooms

                </a>

                <a class="nav-link luxury-link"
                   href="reservations.html">

                    Reservations

                </a>

                <a class="nav-link luxury-link"
                   href="contact.html">

                    Contact

                </a>

                <template v-if="!loggedUser">

                    <a class="nav-link luxury-link"
                       href="login.html">

                        Login

                    </a>

                    <a class="nav-link luxury-link"
                       href="signup.html">

                        Sign Up

                    </a>

                </template>

                <template v-else>

                    <a class="nav-link luxury-link"
                       href="profile.html">

                        Profile

                    </a>

                    <a
                            v-if="loggedUser.role === 'admin'"
                            class="nav-link luxury-link"
                            href="admin.html">

                        Admin

                    </a>

                    <div class="balance-box" v-on:click="syncUser">

                        € {{ loggedUser.balance }}

                    </div>

                    <button
                            class="btn logout-btn"
                            v-on:click="logout">

                        Logout

                    </button>

                </template>

            </div>

        </div>

    </nav>

    <!-- HERO -->

    <section class="page-header">

        <div class="container text-center">

            <h1 class="page-title">

                Reservations

            </h1>

            <p>

                Book and manage your luxury stay.

            </p>

        </div>

    </section>

    <!-- CONTENT -->

    <section class="reservations-page">

        <div class="container">

            <!-- CREATE RESERVATION -->

            <div class="reservation-card">

                <h2>

                    Create Reservation

                </h2>

                <div class="row">

                    <div class="col-md-4">

                        <label class="form-label">

                            Selected Room

                        </label>

                        <input
                                class="form-control"

                                v-model="reservationRoomId">

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">

                            Check In

                        </label>

                        <input
                                type="date"

                                class="form-control"

                                v-model="reservationCheckIn">

                    </div>

                    <div class="col-md-4">

                        <label class="form-label">

                            Check Out

                        </label>

                        <input
                                type="date"

                                class="form-control"

                                v-model="reservationCheckOut">

                    </div>

                </div>

                <button
                        class="btn reserve-btn mt-4"

                        v-on:click="createReservation">

                    Reserve Now

                </button>

            </div>

            <!-- CANCEL RESERVATION -->

            <div class="reservation-card mt-5">

                <h2>

                    Cancel Reservation

                </h2>

                <div class="row">

                    <div class="col-md-8">

                        <input
                                class="form-control"

                                v-model="cancelReservationId"

                                placeholder="Reservation ID">

                    </div>

                    <div class="col-md-4">

                        <button
                                class="btn btn-danger w-100"

                                v-on:click="cancelReservation">

                            Cancel Booking

                        </button>

                    </div>

                </div>

            </div>

            <!-- STATUS -->

            <div class="reservation-card mt-5">

                <h2>

                    Reservation Status

                </h2>

            </div>
            <div
                    v-if="statusMessage"
                    class="reservation-status-card"
                    :class="'status-' + statusType">

                <h4>{{ statusMessage }}</h4>

                <p v-if="output.required">

                    Required Balance:
                    €{{ output.required }}

                </p>

                <p v-if="output.currentBalance">

                    Current Balance:
                    €{{ output.currentBalance }}

                </p>

            </div>


        </div>

    </section>

    <!-- FOOTER -->

    <footer class="footer">

        <div class="container text-center">

            Luxury Hotel © 2026

        </div>

    </footer>


</div>

<script src="libs/vue.js"></script>

<script src="libs/axios.js"></script>

<script src="js/config.js"></script>

<script src="js/clientMethods.js"></script>

<script src="js/userMethods.js"></script>

<script src="js/roomMethods.js"></script>

<script src="js/reservationMethods.js"></script>

<script src="js/balanceRequestMethods.js"></script>

<script src="js/app.js"></script>

</body>

</html>
